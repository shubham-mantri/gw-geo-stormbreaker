# Web dashboard CI (Next.js app in web/). Runs lint, typecheck, unit tests
# (Vitest) and the Playwright e2e. Separate from the Python `ci.yml` and only
# triggers on changes under web/.
name: web-ci

on:
  push:
    paths:
      - "web/**"
      - ".github/workflows/web-ci.yml"
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/web-ci.yml"

defaults:
  run:
    working-directory: web

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Type check (tsc)
        run: npm run typecheck

      - name: Unit tests (vitest)
        run: npm run test

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E (playwright)
        run: npm run e2e
