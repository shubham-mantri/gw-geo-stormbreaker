# Skeleton — fleshed out in M0 (see docs/trd.md and docs/tasks/).
# Mirrors gw-backend-stormbreaker conventions: Python 3.13, Lambda + Step Functions.
service: gw-geo-stormbreaker

frameworkVersion: "4"

provider:
  name: aws
  runtime: python3.13
  region: ${opt:region, 'us-east-1'}
  stage: ${opt:stage, 'dev'}
  environment:
    STAGE: ${self:provider.stage}
    # DATABASE_URL, PINECONE_API_KEY, S3_BUCKET, etc. injected via SSM in M0

# functions: defined per subsystem during M0 (probe workers, aggregator, attribution ingest, ...)
functions:
  runMeasurement:
    # Probe -> parse -> aggregate -> persist for one brand (TRD §11); same pipeline as
    # `python -m gw_geo.cli measure`. Handler path mirrors the installed package's import path
    # (pyproject.toml maps src/ -> the gw_geo package root); packaging (zipping src/gw_geo's
    # contents to the deployment root) is a deployment concern tracked separately from M0.
    handler: gw_geo.handlers.run_measurement.handler

  run_drift:
    # Daily drift canary (TRD §5.6, m1-design §4): probes the fixed canary set through the
    # normal registered adapters via `gw_geo.orchestration.drift.run_drift_canary`, using the
    # same `build_runtime` wiring as `runMeasurement`, and alerts to SNS on a baseline-rate
    # breach (docs/tasks/M1-T17-drift-schedule-handler.md). Schedule-triggered only — no other
    # event source needed.
    handler: gw_geo.handlers.run_drift.handler
    environment:
      # Keys read by build_runtime (M1-T18 registers every engine by config), the ClaudeExtractor,
      # the S3RawArchive, and the DB session this handler wires. API-engine keys register their
      # adapter when set (claude keys off GEO_ANTHROPIC_API_KEY; DeepSeek also needs
      # GEO_DEEPSEEK_ENABLED, off by default per TRD OT3 -- set it explicitly to opt in).
      GEO_DATABASE_URL: ${env:GEO_DATABASE_URL, ''}
      GEO_S3_BUCKET: ${env:GEO_S3_BUCKET, ''}
      GEO_PERPLEXITY_API_KEY: ${env:GEO_PERPLEXITY_API_KEY, ''}
      GEO_OPENAI_API_KEY: ${env:GEO_OPENAI_API_KEY, ''}
      GEO_ANTHROPIC_API_KEY: ${env:GEO_ANTHROPIC_API_KEY, ''}
      GEO_GEMINI_API_KEY: ${env:GEO_GEMINI_API_KEY, ''}
      GEO_COPILOT_API_KEY: ${env:GEO_COPILOT_API_KEY, ''}
      GEO_DEEPSEEK_API_KEY: ${env:GEO_DEEPSEEK_API_KEY, ''}
      # Capture-fleet refs for the Playwright surfaces (google_ai_overviews/chatgpt/grok). Left
      # empty here: build_runtime only attempts the live browser fleet when BOTH are set, and that
      # deploy path needs the SecretProvider layer that resolves these refs into ProxyPool/
      # AccountPool material (not yet implemented -- see wiring._build_live_capture).
      GEO_PROXY_POOL_CONFIG_REF: ${env:GEO_PROXY_POOL_CONFIG_REF, ''}
      GEO_ACCOUNT_POOL_CONFIG_REF: ${env:GEO_ACCOUNT_POOL_CONFIG_REF, ''}
      GEO_DRIFT_THRESHOLD: ${env:GEO_DRIFT_THRESHOLD, '0.2'}
      GEO_DRIFT_SNS_TOPIC_ARN: ${env:GEO_DRIFT_SNS_TOPIC_ARN, ''}
    events:
      - schedule: cron(0 6 * * ? *)

  run_adaptation:
    # Continuous adaptation cycle (m4-design §3.3, docs/tasks/M4-T16-handlers-serverless.md):
    # drift canary -> retrain trigger -> seeding-target discovery -> bandit-allocated seeding
    # tasks, via `gw_geo.orchestration.scheduler.run_adaptation_cycle` (T15). Uses the same
    # `build_runtime` wiring as `runMeasurement`/`run_drift` for the drift leg; the seeding
    # workflow (T10) and retrain trigger (T12) are real, with two documented best-effort
    # stand-ins for collaborators that have nowhere real to resolve to yet -- see
    # `handlers/run_adaptation.py`'s module docstring: target discovery has no real per-domain
    # `SourceMap` (M1's `citation_source_mix` answers a different, incompatible question), and
    # the M3 ranking retrainer is not yet adapted to the `Retrainer` contract (a triggered
    # retrain honestly fails rather than faking success).
    #
    # `run_adaptation_cycle` is scoped to one (tenant_id, brand_id) pair per call (T16 interface);
    # this bare schedule has no way to enumerate every active tenant/brand itself. A real
    # multi-tenant deploy needs a fan-out layer in front of this cron (a Step Functions Map state,
    # or a thin dispatcher Lambda reading active tenants/brands and invoking this function once
    # per pair) -- not built here, tracked as a follow-on alongside the two stand-ins above.
    handler: gw_geo.handlers.run_adaptation.handler
    environment:
      # Same build_runtime inputs as run_drift (the drift leg of this cycle reuses that wiring
      # verbatim), plus the bandit policy selection (T07) for effort allocation across targets.
      GEO_DATABASE_URL: ${env:GEO_DATABASE_URL, ''}
      GEO_S3_BUCKET: ${env:GEO_S3_BUCKET, ''}
      GEO_PERPLEXITY_API_KEY: ${env:GEO_PERPLEXITY_API_KEY, ''}
      GEO_OPENAI_API_KEY: ${env:GEO_OPENAI_API_KEY, ''}
      GEO_ANTHROPIC_API_KEY: ${env:GEO_ANTHROPIC_API_KEY, ''}
      GEO_GEMINI_API_KEY: ${env:GEO_GEMINI_API_KEY, ''}
      GEO_COPILOT_API_KEY: ${env:GEO_COPILOT_API_KEY, ''}
      GEO_DEEPSEEK_API_KEY: ${env:GEO_DEEPSEEK_API_KEY, ''}
      GEO_PROXY_POOL_CONFIG_REF: ${env:GEO_PROXY_POOL_CONFIG_REF, ''}
      GEO_ACCOUNT_POOL_CONFIG_REF: ${env:GEO_ACCOUNT_POOL_CONFIG_REF, ''}
      GEO_DRIFT_THRESHOLD: ${env:GEO_DRIFT_THRESHOLD, '0.2'}
      GEO_BANDIT_POLICY: ${env:GEO_BANDIT_POLICY, 'ucb1'}
      GEO_BANDIT_EXPLORE_C: ${env:GEO_BANDIT_EXPLORE_C, '1.0'}
    events:
      # Daily, one hour after the drift canary (run_drift, 06:00 UTC) so a same-day breach can
      # feed straight into this cycle's retrain/seeding pass.
      - schedule: cron(0 7 * * ? *)

  close_billing:
    # Monthly billing period-close (m4-design §4.2/§4.4, docs/tasks/M4-T16-handlers-serverless.md):
    # meters the closed period (T08), prices it (T09), and persists a `billing_invoice` row (T02)
    # via `gw_geo.handlers.close_billing.handler`. `plan` is read from the tenant's real
    # `billing_account` row; `attribution` is a documented $0 stand-in until a real M2
    # `AttributionSource` adapter exists (see the handler module's docstring) -- RaaS is disabled
    # by default (`raas_enabled=False`) until then regardless (PRD OQ4).
    #
    # Scoped to one `tenant_id` per call -- same fan-out caveat as `run_adaptation` above.
    handler: gw_geo.handlers.close_billing.handler
    environment:
      GEO_DATABASE_URL: ${env:GEO_DATABASE_URL, ''}
    events:
      # Monthly, 03:00 UTC on the 1st -- closes the prior calendar month's usage period.
      - schedule: cron(0 3 1 * ? *)

# plugins: serverless-python-requirements, etc. — added in M0
plugins: []
