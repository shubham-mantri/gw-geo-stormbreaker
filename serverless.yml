# Skeleton — fleshed out in M0 (see docs/trd.md and docs/tasks/).
# Mirrors gw-backend-stormbreaker conventions: Python 3.13, Lambda + Step Functions.
service: gw-geo-stormbreaker

frameworkVersion: "4"

provider:
  name: aws
  runtime: python3.13
  region: ${opt:region, 'us-east-1'}
  stage: ${opt:stage, 'dev'}
  environment:
    STAGE: ${self:provider.stage}
    # DATABASE_URL, PINECONE_API_KEY, S3_BUCKET, etc. injected via SSM in M0

# functions: defined per subsystem during M0 (probe workers, aggregator, attribution ingest, ...)
functions:
  runMeasurement:
    # Probe -> parse -> aggregate -> persist for one brand (TRD §11); same pipeline as
    # `python -m gw_geo.cli measure`. Handler path mirrors the installed package's import path
    # (pyproject.toml maps src/ -> the gw_geo package root); packaging (zipping src/gw_geo's
    # contents to the deployment root) is a deployment concern tracked separately from M0.
    handler: gw_geo.handlers.run_measurement.handler

  run_drift:
    # Daily drift canary (TRD §5.6, m1-design §4): probes the fixed canary set through the
    # normal registered adapters via `gw_geo.orchestration.drift.run_drift_canary`, using the
    # same `build_runtime` wiring as `runMeasurement`, and alerts to SNS on a baseline-rate
    # breach (docs/tasks/M1-T17-drift-schedule-handler.md). Schedule-triggered only — no other
    # event source needed.
    handler: gw_geo.handlers.run_drift.handler
    environment:
      # Keys read by build_runtime (M1-T18 registers every engine by config), the ClaudeExtractor,
      # the S3RawArchive, and the DB session this handler wires. API-engine keys register their
      # adapter when set (claude keys off GEO_ANTHROPIC_API_KEY; DeepSeek also needs
      # GEO_DEEPSEEK_ENABLED, off by default per TRD OT3 -- set it explicitly to opt in).
      GEO_DATABASE_URL: ${env:GEO_DATABASE_URL, ''}
      GEO_S3_BUCKET: ${env:GEO_S3_BUCKET, ''}
      GEO_PERPLEXITY_API_KEY: ${env:GEO_PERPLEXITY_API_KEY, ''}
      GEO_OPENAI_API_KEY: ${env:GEO_OPENAI_API_KEY, ''}
      GEO_ANTHROPIC_API_KEY: ${env:GEO_ANTHROPIC_API_KEY, ''}
      GEO_GEMINI_API_KEY: ${env:GEO_GEMINI_API_KEY, ''}
      GEO_COPILOT_API_KEY: ${env:GEO_COPILOT_API_KEY, ''}
      GEO_DEEPSEEK_API_KEY: ${env:GEO_DEEPSEEK_API_KEY, ''}
      # Capture-fleet refs for the Playwright surfaces (google_ai_overviews/chatgpt/grok). Left
      # empty here: build_runtime only attempts the live browser fleet when BOTH are set, and that
      # deploy path needs the SecretProvider layer that resolves these refs into ProxyPool/
      # AccountPool material (not yet implemented -- see wiring._build_live_capture).
      GEO_PROXY_POOL_CONFIG_REF: ${env:GEO_PROXY_POOL_CONFIG_REF, ''}
      GEO_ACCOUNT_POOL_CONFIG_REF: ${env:GEO_ACCOUNT_POOL_CONFIG_REF, ''}
      GEO_DRIFT_THRESHOLD: ${env:GEO_DRIFT_THRESHOLD, '0.2'}
      GEO_DRIFT_SNS_TOPIC_ARN: ${env:GEO_DRIFT_SNS_TOPIC_ARN, ''}
    events:
      - schedule: cron(0 6 * * ? *)

# plugins: serverless-python-requirements, etc. — added in M0
plugins: []
